<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>VoltFlow // Menadżer Serwisu</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="kontener-aplikacji">
        <aside class="panel-boczny">
            <div class="logo">⚡ Volt<span>Flow</span></div>
            <form id="formularz-zgloszenia">
                <div class="grupa-pola">
                    <label>Klient</label>
                    <input type="text" id="nazwaKlienta" placeholder="Imię i nazwisko" required>
                </div>
                <div class="grupa-pola">
                    <label>Urządzenie</label>
                    <input type="text" id="typUrzadzenia" placeholder="np. Laptop Dell" required>
                </div>
                <div class="grupa-pola">
                    <label>Cena usługi (zł)</label>
                    <input type="number" id="cenaUslugi" placeholder="0.00" step="0.01" required>
                </div>
                <button type="submit" id="przycisk-dodaj">Dodaj Zlecenie</button>
            </form>

            <div class="box-statystyk">
                <p>Razem do zarobienia:</p>
                <h2 id="suma-wartosc">0 PLN</h2>
            </div>
        </aside>

        <main class="tresc">
            <header>
                <h1>Lista Zleceń</h1>
            </header>
            <div id="lista-zgloszen" class="grid-zgloszen">
                </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
